<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Emotion Detector</title>
     <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: #fff;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        h2 {
            color: #1e3c72;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .subtitle {
            color: #666;
            margin-bottom: 25px;
        }

        .file-input-wrapper {
            margin-bottom: 20px;
        }

        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 2px dashed #2a5298;
            border-radius: 10px;
            cursor: pointer;
            background: #f8f9ff;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #2a5298;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1e3c72;
            transform: translateY(-2px);
        }

        .result-card {
            margin-top: 25px;
            padding-top: 20px;
        }

        .result-card p {
            color: #555;
            margin-bottom: 10px;
        }

        .emotion-text {
            color: #28a745;
            font-size: 28px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .image-preview {
            margin: 20px 0;
        }

        .image-preview img {
            width: 100%;
            max-height: 350px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        .reset-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 12px 24px;
            background: #dc3545;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        .reset-btn:hover {
            background: #b02a37;
        }

        hr {
            border: none;
            height: 1px;
            background: #ddd;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            h2 {
                font-size: 1.7rem;
            }

            .emotion-text {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Emotion Detector</h2>
        <p class="subtitle">Upload a face to detect the mood</p>

        <form method="POST" enctype="multipart/form-data">
            <div class="file-input-wrapper">
                <input type="file" name="image" id="file" required>
            </div>
            <button type="submit">Analyze Emotion</button>
        </form>

        {% if prediction %}
            <div class="result-card">
                <hr>
                <p>Analysis Result:</p>
                <h3 class="emotion-text">{{ prediction }}</h3>
                <div class="image-preview">
                    <img src="{{ image_path }}" alt="Uploaded Image">
                </div>
                <a href="/" class="reset-btn">Try Another</a>
            </div>
        {% endif %}
    </div>

</body>
</html>
